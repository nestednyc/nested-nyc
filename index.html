<!DOCTYPE html>

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Nested — a student-only project network for NYC universities" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nested NYC — a student-only project network" />
    <meta name="twitter:description" content="Discover projects, find teammates, and browse events across NYC campuses." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

          "description": "A student-only project network for NYC universities.",
          "publisher": { "@id": "https://nested.social/#org" }
        },
        {
          "@type": "Organization",
          "@id": "https://nested.social/#org",
          "name": "Nested",
          "url": "https://nested.social/",
          "logo": "https://nested.social/og-default.png"
        }
      ]
    }
